<div class="container mt-5">
    <h1 class="mb-4">Sistema de turnos</h1>
    <div class="row justify-content-center">
        <div class="card col-md-12">
            <div class="row">
                <p>Para generar un nuevo ticket de turno haga click en "Nuevo turno". <br>
                    Para modificar los datos de un turno ya registrado presione "Modificar existente".</p>
            </div>
            <div class="row">
                <div class="col-md-3 right"></div>
                <div class="col-md-3 right">
                    <button type="submit" class="btn btn-primary">Nuevo turno</button>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary">Modificar existente</button>
                </div>
                <div class="col-md-3 right"></div>
            </div>
        </div>
    </div>
</div>
