<app-user-navbar></app-user-navbar>

<div class="container mt-5">
    <h1 class="mb-4">Acceso al sistema</h1>
    <p>Ingrese los datos con los que está registrado su turno.</p>
    <div class="row justify-content-center">
        <div class="card col-md-6 app-card">
            <form>
                <div class="mb-3">
                    <label for="numTurno" class="form-label">N° de turno</label>
                    <input type="number" class="form-control" id="numTurno" name="numTurno"
                        [(ngModel)]="ticketFilter.numTurno" />
                </div>

                <div class="mb-3">
                    <label for="curp" class="form-label">CURP</label>
                    <input type="text" class="form-control" id="curp" name="curp" [(ngModel)]="ticketFilter.curp" />
                </div>

                <div class="mb-3">
                    <label for="municipio" class="form-label">Municipio</label>
                    <select class="form-select" id="municipio" name="municipio" [(ngModel)]="ticketFilter.idMunicipio">
                        <option value="" disabled selected hidden>Seleccionar municipio</option>
                        @for (item of municipios; track $index) {
                        <option [value]="item.idMunicipio">{{ item.nombre }}</option>
                        }
                    </select>
                </div>

                <div class="mb-3 action-row">
                    <button type="submit" class="btn btn-primary" (click)="btnLogin()">Ingresar</button>
                    <button type="button" class="btn btn-secondary" (click)="goBack()">Atrás</button>
                </div>
            </form>
        </div>
    </div>
</div>
