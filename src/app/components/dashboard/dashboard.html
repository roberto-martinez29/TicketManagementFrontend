<app-admin-navbar></app-admin-navbar>

<div class="container mt-4">
    <div class="dashboard-header">
        <div>
            <p class="dashboard-kicker"></p>
            <h2 class="dashboard-title">Dashboard</h2>
        </div>
        <div class="dashboard-badge">{{ ticketsFiltrados.length }} tickets</div>
    </div>

    <div class="filter-card mb-4">
        <div class="filter-card__header">
            <div>
                <span class="chart-card__label">Filtro</span>
                <h3>Municipios</h3>
            </div>
            <button type="button" class="btn btn-outline-secondary btn-sm" (click)="limpiarFiltroMunicipios()">
                Mostrar todos
            </button>
        </div>

        <select class="form-select" multiple (change)="onMunicipiosChange($event)">
            @for (item of municipios; track item.idMunicipio) {
            <option [value]="item.idMunicipio" [selected]="selectedMunicipioIds.includes(item.idMunicipio)">
                {{ item.nombre }}
            </option>
            }
        </select>
        <small class="filter-card__help">Puedes seleccionar uno o varios municipios.</small>
    </div>

    <div class="row">
        <div class="col-lg-6 mb-4">
            <div class="chart-card">
                <div class="chart-card__header">
                    <div>
                        <span class="chart-card__label">Distribución</span>
                        <h3>Resueltos vs pendientes</h3>
                    </div>
                </div>
                <div class="chart-card__body">
                    <canvas #ticketChart></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-6 mb-4">
            <div class="chart-card">
                <div class="chart-card__header">
                    <div>
                        <span class="chart-card__label">Municipios</span>
                        <h3>Tickets por municipio</h3>
                    </div>
                </div>
                <div class="chart-card__body">
                    <canvas #ticketsPorMunicipioChart></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-12 mb-4">
            <div class="stats-stack">
                <div class="stat-card stat-card--total">
                    <span class="stat-card__label">Tickets totales</span>
                    <strong class="stat-card__value">{{ ticketsFiltrados.length }}</strong>
                </div>

                <div class="stat-card stat-card--resolved">
                    <span class="stat-card__label">Resueltos</span>
                    <strong class="stat-card__value">{{ resueltos }}</strong>
                </div>

                <div class="stat-card stat-card--pending">
                    <span class="stat-card__label">Pendientes</span>
                    <strong class="stat-card__value">{{ pendientes }}</strong>
                </div>
            </div>
        </div>
    </div>
</div>
