<div class="app-banner">
    <picture>
        <source media="(max-width: 768px)" srcset="/banner-ticket-mobile.svg" />
        <img src="/banner-ticket.svg" alt="Banner del sistema de turnos" />
    </picture>
</div>

<div class="container mt-5">
    <h1 class="mb-4">Acceso al sistema</h1>
    <p>Ingrese los datos de acceso.</p>
    <div class="row justify-content-center">
        <div class="card col-md-6 app-card">
            <form (ngSubmit)="btnLogin()">
                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuario</label>
                    <input type="text" class="form-control" id="usuario" name="usuario"
                        [(ngModel)]="adminFilter.usuario" />
                </div>

                <div class="mb-3">
                    <label for="contraseña" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="contraseña" name="contraseña"
                        [(ngModel)]="adminFilter.contrasena" />
                </div>

                <div class="mb-3">
                    <ngx-recaptcha2 [siteKey]="recaptchaSiteKey" (success)="onCaptchaSuccess($event)"
                        (expire)="onCaptchaExpired()" (reset)="onCaptchaExpired()">
                    </ngx-recaptcha2>
                    <small class="text-danger">{{ captchaError }}</small>
                </div>

                <div class="mb-3 action-row">
                    <button type="submit" class="btn btn-primary" [disabled]="!recaptchaToken">Ingresar</button>
                    <button type="button" class="btn btn-secondary" (click)="goBack()">Atrás</button>
                </div>
            </form>
        </div>
    </div>
</div>
